{% extends 'agenda/base.html' %}

{% block title %}🗑️ Eliminar Tarea{% endblock %}

{% block extra_styles %}
{% load static %}
<link rel="stylesheet" href="{% static 'agenda/estilos.css' %}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
{% endblock %}

{% block content %}
  <h1>🗑️ Eliminar Tarea</h1>
  <button id="modoOscuroToggle">🌙 Modo oscuro</button>

  <div class="formulario">
    <p style="color: #e74c3c; font-weight: bold">
      ¿Estás segura de que quieres eliminar esta tarea?
    </p>
    <p><strong>{{ tarea.descripcion }}</strong></p>
    <form id="formEliminar" method="post">
      {% csrf_token %}
      <button type="button" onclick="confirmarEliminacion()">Sí, eliminar</button>
      <a href="{% url 'lista_tareas' %}" class="cancelar">Cancelar</a>
    </form>
  </div>

  <script>
    const botonModo = document.getElementById('modoOscuroToggle');

    function actualizarTextoBoton() {
      botonModo.textContent = document.body.classList.contains('dark-mode')
        ? '☀️ Modo claro'
        : '🌙 Modo oscuro';
    }

    if (localStorage.getItem('modoOscuro') === 'activado') {
      document.body.classList.add('dark-mode');
    }

    actualizarTextoBoton();

    botonModo.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem(
        'modoOscuro',
        document.body.classList.contains('dark-mode') ? 'activado' : 'desactivado'
      );
      actualizarTextoBoton();
    });

    function confirmarEliminacion() {
      const esModoOscuro = document.body.classList.contains('dark-mode');

      Swal.fire({
        title: "¿Eliminar tarea?",
        text: "Esta acción no se puede deshacer.",
        icon: "warning",
        background: esModoOscuro ? "#2c2c2c" : "#fff",
        color: esModoOscuro ? "#f0f0f0" : "#333",
        showCancelButton: true,
        confirmButtonColor: "#e74c3c",
        cancelButtonColor: "#3085d6",
        confirmButtonText: "Sí, eliminar",
        cancelButtonText: "Cancelar",
      }).then((result) => {
        if (result.isConfirmed) {
          document.getElementById("formEliminar").submit();
        }
      });
    }
  </script>
{% endblock %}
