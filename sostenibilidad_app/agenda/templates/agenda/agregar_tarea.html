{% extends 'agenda/base.html' %}

{% block title %}📝 Agregar Tarea{% endblock %}

{% block extra_styles %}
{% load static %}
<link rel="stylesheet" href="{% static 'agenda/estilos.css' %}">
{% endblock %}

{% block content %}
  <h1>📝 Agregar Nueva Tarea</h1>
  <button id="modoOscuroToggle">🌙 Modo oscuro</button>
  <div class="formulario">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Guardar</button>
    </form>
  </div>
  <p><a href="{% url 'lista_tareas' %}">← Volver a la lista</a></p>

  <script>
    const botonModo = document.getElementById('modoOscuroToggle');

    function actualizarTextoBoton() {
      if (document.body.classList.contains('dark-mode')) {
        botonModo.textContent = '☀️ Modo claro';
      } else {
        botonModo.textContent = '🌙 Modo oscuro';
      }
    }

    if (localStorage.getItem('modoOscuro') === 'activado') {
      document.body.classList.add('dark-mode');
    }

    actualizarTextoBoton();

    botonModo.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');

      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('modoOscuro', 'activado');
      } else {
        localStorage.setItem('modoOscuro', 'desactivado');
      }

      actualizarTextoBoton();
    });
  </script>
{% endblock %}
