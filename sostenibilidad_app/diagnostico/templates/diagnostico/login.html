<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso a la plataforma</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f9f9f9;
    }

    h2 {
      text-align: center;
      margin-top: 40px;
      font-size: 1.8em;
    }

    form {
      max-width: 400px;
      margin: 30px auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    form label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    form input {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      flex: 1;
      padding-right: 2.5em;
    }

    .toggle-password {
  position: absolute;
  right: 10px;
  top: 8px; /* ← este valor lo puedes ajustar */
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.2em;
  line-height: 1;
  padding: 0;
}

    button[type="submit"] {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: #00796b;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1em;
      cursor: pointer;
    }

    .alert {
      max-width: 400px;
      margin: 10px auto;
      background-color: #f8d7da;
      padding: 10px;
      border-radius: 4px;
      color: #721c24;
      text-align: center;
    }

    p {
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>Acceso a la plataforma</h2>

  {% if messages %}
    {% for message in messages %}
      <div class="alert">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post">
  {% csrf_token %}

  <label for="id_username">Nombre de usuario:</label>
  {{ form.username }}

  <label for="id_password">Contraseña:</label>
  <div class="input-wrapper">
    {{ form.password }}
    <button type="button" onclick="togglePassword('id_password')" class="toggle-password">👁️</button>
  </div>

  <input type="hidden" name="next" value="{{ next }}">  <!-- ← esta línea es clave -->

  <button type="submit">Entrar</button>
</form>


  <p>¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a></p>
  <p style="text-align: center;">
  <a href="{% url 'home' %}">← Volver al inicio</a>
  </p>

  <script>
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const isHidden = field.type === "password";
      field.type = isHidden ? "text" : "password";
    }
  </script>

</body>
</html>
